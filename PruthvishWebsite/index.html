<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pruthvish & himself</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            text-align: center;
            max-width: 600px;
            animation: slideUp 0.8s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        .heart {
            color: #e74c3c;
            font-size: 1.2em;
            animation: heartbeat 1.2s infinite;
        }
        
        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.3);
            }
        }
        
        .message {
            font-size: 1.5em;
            color: #333;
            margin: 30px 0;
            line-height: 1.8;
            font-weight: 500;
        }
        
        .highlight {
            color: #667eea;
            font-weight: 700;
            background: linear-gradient(120deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 1.2em;
            color: #764ba2;
            margin-top: 30px;
            font-style: italic;
        }
        
        .decoration {
            margin-top: 40px;
            font-size: 2em;
            letter-spacing: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pruthvish <span class="heart">❤</span></h1>
        
        <div class="message">
            <p>Pruthvish likes <span class="highlight">HIMSELF</span></p>
        </div>
        
        <div class="subtitle">
            lala land type shi ✨
        </div>
        
        <div class="decoration">
            ✧ ✧ ✧
        </div>
    </div>
</body>
</html>
